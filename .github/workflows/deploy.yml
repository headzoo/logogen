# Deploys the Cloudflare Worker when changes are pushed to main.
#
# Required GitHub repository secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN  - API token with Workers Scripts (Edit), D1 (Edit),
#                           Workers R2 Storage (Edit), and Account Settings (Read)
#   CLOUDFLARE_ACCOUNT_ID - Your Cloudflare account ID
#
# Runtime secrets (e.g. OPENAI_API_KEY) are managed separately via:
#   wrangler secret put OPENAI_API_KEY

name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          preCommands: wrangler d1 migrations apply logogen_db --remote
          command: deploy
